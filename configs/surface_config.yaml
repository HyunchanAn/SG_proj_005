# Surface Anomaly Detection Configuration (PatchCore) - M2 Pro Optimized

dataset:
  name: surface_dataset
  format: folder
  path: ./datasets/custom
  normal_dir: train/good
  abnormal_dir: test/bad
  normal_test_dir: test/good
  task: classification
  mask_dir: null
  extensions: null
  split_mode: from_dir
  image_size: [256, 256] # Balanced resolution for M2 Pro
  center_crop: null
  normalization: imagenet
  train_batch_size: 16 # Adjusted for 16GB RAM
  eval_batch_size: 16
  num_workers: 4
  
model:
  name: patchcore
  backbone: wide_resnet50_2 # Efficient feature extraction for M2 Pro
  pre_trained: true
  coreset_sampling_ratio: 0.1
  num_neighbors: 9

metrics:
  image:
    - F1Score
    - AUROC
  pixel:
    - F1Score
    - AUROC
  threshold:
    method: adaptive

trainer:
  accelerator: mps # Use Metal Performance Shaders for Mac GPU
  devices: 1
  max_epochs: 1
  default_root_dir: ./results
  val_check_interval: 1.0

logging:
  logger: []
  log_graph: false

project:
  seed: 42
  path: ./results
