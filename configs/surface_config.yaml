# Surface Anomaly Detection Configuration (PatchCore) - M2 Pro Optimized

dataset:
  name: surface_dataset
  format: folder
  path: ./datasets/custom
  normal_dir: train/good
  abnormal_dir: test/bad
  normal_test_dir: test/good
  task: classification
  mask_dir: null
  extensions: null
  split_mode: from_dir
  image_size: [512, 512] # High resolution for RTX 4060
  center_crop: null
  normalization: imagenet
  train_batch_size: 32 # Optimized for 8GB VRAM
  eval_batch_size: 32
  num_workers: 4
  
model:
  name: patchcore
  backbone: wide_resnet101_2 # Enhanced feature extraction
  pre_trained: true
  coreset_sampling_ratio: 0.1
  num_neighbors: 9

metrics:
  image:
    - F1Score
    - AUROC
  pixel:
    - F1Score
    - AUROC
  threshold:
    method: adaptive

trainer:
  accelerator: cuda # Use NVIDIA CUDA
  devices: 1
  max_epochs: 1
  default_root_dir: ./results
  val_check_interval: 1.0

logging:
  logger: []
  log_graph: false

project:
  seed: 42
  path: ./results
