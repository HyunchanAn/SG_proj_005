[mypy]
python_version = 3.12
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
ignore_missing_imports = true

[mypy-anomalib.*]
ignore_missing_imports = true

[mypy-sam2.*]
ignore_missing_imports = true

[mypy-torch.*]
ignore_missing_imports = true

[mypy-torchvision.*]
ignore_missing_imports = true

[mypy-PIL.*]
ignore_missing_imports = true

[mypy-matplotlib.*]
ignore_missing_imports = true

[mypy-streamlit.*]
ignore_missing_imports = true

[mypy-gradio.*]
ignore_missing_imports = true

[mypy-loguru.*]
ignore_missing_imports = true

[mypy-pydantic_settings.*]
ignore_missing_imports = true
