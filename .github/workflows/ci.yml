name: Python Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core testing and type-checking dependencies first to ensure clean execution
        pip install ruff mypy pytest pytest-cov loguru gradio pydantic-settings
        # Attempt setting up project requirements but bypass third-party GPU compile constraints
        pip install -r requirements.txt || true

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Format Check with Ruff
      run: |
        ruff format --check .

    - name: Type Check with mypy
      run: |
        mypy app.py app_gradio.py inference_engine.py train.py tests tools

    - name: Run Tests with Pytest
      run: |
        pytest --cov=inference_engine --cov=train --cov-report=xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
