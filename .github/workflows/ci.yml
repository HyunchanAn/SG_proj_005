name: Python Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install with dev options using the new pyproject.toml specification
        pip install .[dev]

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Format Check with Ruff
      run: |
        ruff format --check .

    - name: Type Check with mypy
      run: |
        mypy app.py app_gradio.py inference_engine.py train.py tests tools > mypy_error.log 2>&1 || true
        cat mypy_error.log

    - name: Upload mypy log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mypy-log
        path: mypy_error.log

    - name: Run Tests with Pytest
      run: |
        pytest tests/ -v --cov=. --cov-report=xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
