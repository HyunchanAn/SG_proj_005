version: '3.8'

services:
  app:
    build: .
    image: surface-anomaly-detection:latest
    container_name: surface-anomaly-app
    ports:
      - "8501:8501"
    restart: unless-stopped
    volumes:
      # 필요 시 호스트의 가중치나 설정을 마운트할 수 있습니다.
      # 여기서는 이미지 내부에 포함된 모델을 사용하므로 기본적으로는 필요 없으나,
      # 추후 업데이트를 위해 주석 처리된 예시를 남겨둡니다.
      # - ./exported_models:/app/exported_models
      - ./results:/app/results
    environment:
      - TRUST_REMOTE_CODE=1
